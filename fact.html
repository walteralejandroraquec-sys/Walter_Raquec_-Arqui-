    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Factura Editable</title>
    </head>

    <body>

      <div class="factura">
        <h1>FACTURA</h1>

        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ingrese el nombre">
        </div>

        <div class="campo">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Ingrese el apellido">
        </div>

        <div class="campo">
          <label for="fecha">Fecha de Venta</label>
          <input type="date" id="fecha">
        </div>

        <div class="campo">
          <label for="codigo">Código de Producto</label>
          <input type="text" id="codigo" placeholder="Ingrese el código del producto">
        </div>

        <div class="campo">
          <label for="productos">Productos Comprados</label>
          <textarea id="productos" placeholder="Ingrese los productos comprados"></textarea>
        </div>

        <div class="botones">
          <button onclick="window.print()">Imprimir Factura</button>
          <button onclick="limpiarFormulario()">Limpiar</button>
        </div>
      </div>

      <script>
        function limpiarFormulario() {
          document.getElementById('nombre').value = '';
          document.getElementById('apellido').value = '';
          document.getElementById('fecha').value = '';
          document.getElementById('codigo').value = '';
          document.getElementById('productos').value = '';
        }
      </script>
      </div>
    </body>
    <script src="js/oscu.js"></script>
    <script src="js/fact.js"></script>
