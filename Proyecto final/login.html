<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>
  <link rel="stylesheet" href="css/_bootswatch.scss">
  <link rel="stylesheet" href="css/_variables.scss">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/bootstrap.rtl.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/osc.css">
  <link rel="shortcut icon" href="png/home.png" type="image/x-icon">
</head>

<body>
  <div>
    <button onclick="cambiarModo()">🌓</button>
    <center>
      <form id="Loginform">
        <fieldset>
          <legend>Inicio de Usuario</legend>
          <div class="row">
            <label for="staticEmail" class="col-sm-2 col-form-label">Login</label>
            <div class="col-sm-10">
              <input type="text" readonly="" class="form-control-plaintext" id="formulario" value="" required>
            </div>
          </div>
          <div>
            <label for="exampleInputEmail1" class="form-label mt-4">Usuario</label>
            <input type="text" class="form-control" id="username" aria-describedby="emailHelp" placeholder="Enter email"
              required>
            <small id="emailHelp" class="form-text text-muted">Ingrese el correo electronico.</small>
          </div>
          <div>
            <label for="exampleInputPassword1" class="form-label mt-4">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Password" autocomplete="off"
              required>
          </div> <br>
          <button type="submit" class="btn btn-primary">Ingreso</button>
        </fieldset>
      </form>x
    </center>
  </div>
</body>
<script src="js/index.js"></script>
<script src="js/oscu.js"></script>

</html>
